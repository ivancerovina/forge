services:
  app:
    image: nginx:latest
    networks:
      - forge-network
      - internal
  database:
    image: postgres:16
    networks:
      - forge-network
  redis:
    image: redis:7
    networks:
      - internal
  mailhog:
    image: mailhog/mailhog
    # no networks — tests nil/default case

networks:
  forge-network:
    external: true
  internal:
    driver: bridge
